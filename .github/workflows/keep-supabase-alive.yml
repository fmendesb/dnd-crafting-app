name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 12 * * 3'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Read player_state
        run: |
          curl -s \
            "${{ secrets.SUPABASE_REST_URL }}/player_state?select=player_name&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"

      - name: Update keepalive timestamp
        run: |
          curl -s -X PATCH \
            "${{ secrets.SUPABASE_REST_URL }}/keepalive?id=eq.1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"last_ping":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}'
